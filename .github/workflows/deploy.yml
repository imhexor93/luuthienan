name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch: # cho phép chạy thủ công từ GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          NEXTAUTH_SECRET:          ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_PASSWORD_ADMIN:      ${{ secrets.AUTH_PASSWORD_ADMIN }}
          AUTH_PASSWORD_MANAGER:    ${{ secrets.AUTH_PASSWORD_MANAGER }}
          AUTH_PASSWORD_VIEWER:     ${{ secrets.AUTH_PASSWORD_VIEWER }}
